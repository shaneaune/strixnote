services:
  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: meilisearch
    environment:
      - MEILI_ENV=production
      - MEILI_NO_ANALYTICS=true
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
    volumes:
      - ./data/meili:/meili_data
    restart: unless-stopped

  upload_api:
    build: ./api
    container_name: upload_api
    environment:
      - STRIXNOTE_VERSION=1.2.0
      - DATA_DIR=/data
      - INCOMING_DIR=/data/incoming
      - PROCESSED_DIR=/data/processed
      - MEILI_URL=http://meilisearch:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - INDEX_TRANSCRIPTS=transcripts
      - INDEX_SEGMENTS=segments
    volumes:
      - ${DATA_DIR:-./data}:/data
      - ./:/app_host
    depends_on:
      - meilisearch
    restart: unless-stopped

  transcribe_worker:
    build: ./worker
    container_name: transcribe_worker
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - WHISPER_MODEL=${WHISPER_MODEL:-medium.en}
      - WHISPER_DEVICE=${WHISPER_DEVICE:-cpu}
      - WHISPER_COMPUTE=${WHISPER_COMPUTE:-int8}
      - WHISPER_MODEL_DIR=/models
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
    volumes:
      - ${DATA_DIR:-./data}:/data
      - ./data/models:/models
    depends_on:
      - meilisearch
    restart: unless-stopped

  search_ui:
    image: nginx:alpine
    container_name: search_ui
    ports:
      - "${STRIXNOTE_WEB_PORT:-8080}:80"
    volumes:
      - ./ui:/usr/share/nginx/html:ro
      - ./ui/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ${DATA_DIR:-./data}/processed:/mnt/audio:ro
    depends_on:
      - upload_api
    restart: unless-stopped
