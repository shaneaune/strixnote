<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>OwlScribe</title>

  <link rel="stylesheet" href="theme.css">
  <link rel="icon" type="image/png" href="/assets/owlscribe-icon.png">

</head>

<body>
  <div class="container">

    <div class="header">
      <div class="brand">
        <div class="brand-badge">
          <img src="/assets/owlscribe-icon.png" alt="OwlScribe">
        </div>
        <div>
          <div class="brand-title">OwlScribe</div>
          <div class="brand-subtitle">Audio Transcription & Search</div>
        </div>
      </div>
    </div>
    <div class="panel" style="margin-top: 12px;">
      <div class="row" style="justify-content: space-between;">
        <div>
          <div style="font-weight:600;">Upload audio</div>
          <div class="small muted">Files are saved to incoming/ and processed automatically.</div>
        </div>
        <div class="row">
          <input id="uploadFiles" type="file" multiple hidden accept=".wav,.mp3,.m4a,.aac,.flac,.ogg,.wma,.mp4,.webm" />

          <button id="chooseBtn" class="btn btn-secondary" type="button">
            Choose files
          </button>

          <span id="chosenLabel" class="small muted" style="align-self:center;">
            No files chosen
          </span>
          <button id="uploadBtn" class="btn btn-primary">Upload</button>
        </div>
      </div>
      <div id="uploadStatus" class="small muted" style="margin-top:10px;"></div>
    </div>

    <div class="tabs">
      <div class="tab active" id="tabSearch">Search</div>
      <div class="tab" id="tabBrowse">Browse</div>
    </div>

    <div id="searchWrap">
      <input id="searchBox" placeholder="Search..." />
    </div>

    <div class="panel">
      <div id="nowPlayingTitle">Player</div>
      <div id="nowPlayingMeta" style="color:#999;"></div>

      <audio id="player" controls preload="metadata"></audio>
      <div id="captionBox" class="captionBox"></div>
    </div>

    <div id="results"></div>

    <div id="browsePager" class="pager" style="display:none;">
      <button id="prevPage">Prev</button>
      <button id="nextPage">Next</button>
    </div>

    <script src="/config.js"></script>

    <script>
      const MEILI = window.APP_CONFIG.MEILI_URL;
      const INDEX_SEG = window.APP_CONFIG.MEILI_INDEX_SEGMENTS;
      const INDEX_FILES = window.APP_CONFIG.MEILI_INDEX_FILES;

      const player = document.getElementById("player");
      const captionBox = document.getElementById("captionBox");
      const resultsDiv = document.getElementById("results");
      const searchBox = document.getElementById("searchBox");

      let mode = "search";
      let browseOffset = 0;
      let currentFile = null;
      const browseLimit = 50;

      function baseName(f) { return f.replace(/\.[^/.]+$/, ""); }
      function msToHMS(ms) {
        const s = Math.floor(ms / 1000);
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        return [h, m, sec].map(v => String(v).padStart(2, "0")).join(":");
      }
      function epochToLocal(e) { return new Date(e * 1000).toLocaleString(); }

      async function meili(index, body) {
        const r = await fetch(`${MEILI}/search/${index}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body)
        });
        return r.json();
      }

      function resetPlayer() {
        try { player.pause(); } catch (e) { }
        player.removeAttribute("src");
        player.innerHTML = "";
        player.load();
        captionBox.textContent = "";
      }

      function wireCaptions() {
        const tt = player.textTracks[0];
        if (!tt) return;
        tt.mode = "hidden";
        tt.addEventListener("cuechange", () => {
          const cues = tt.activeCues;
          if (!cues || !cues.length) { captionBox.textContent = ""; return; }
          captionBox.textContent = Array.from(cues).map(c => c.text).join("\n");
        });
      }

      function loadFile(filename, startMs = 0) {
        currentFile = filename;
        resetPlayer();
        refreshBrowseIfVisible();

        const src = document.createElement("source");
        src.src = "/audio/" + encodeURIComponent(filename);
        player.appendChild(src);

        const track = document.createElement("track");
        track.kind = "subtitles";
        track.srclang = "en";
        track.src = "/audio/" + encodeURIComponent(baseName(filename) + ".vtt");
        track.default = true;
        player.appendChild(track);

        player.load();

        player.addEventListener("loadedmetadata", () => {
          player.currentTime = startMs / 1000;
          player.play().catch(() => { });
        }, { once: true });

        wireCaptions();
      }

      function refreshBrowseIfVisible() {
        if (mode === "browse") {
          document.getElementById("tabBrowse").click();
        }
      }


      searchBox.addEventListener("keypress", async e => {
        if (e.key !== "Enter") return;
        const q = e.target.value.trim();
        if (!q) return;

        const data = await meili(INDEX_SEG, {
          q,
          limit: 200,
          sort: ["created_at:desc"],
          attributesToHighlight: ["text"],
          attributesToCrop: ["text"],
          cropLength: 40
        });

        resultsDiv.innerHTML = "";
        (data.hits || []).forEach(hit => {
          const div = document.createElement("div");
          div.className = "result";
          div.innerHTML = `
      <div class="file">${hit.filename}</div>
      <div class="time">@ ${msToHMS(hit.start_ms)}</div>
      <div class="dt">${epochToLocal(hit.created_at)}</div>
      <div class="snippet">${hit._formatted?.text || hit.text}</div>
    `;
          div.onclick = () => loadFile(hit.filename, hit.start_ms);
          resultsDiv.appendChild(div);
        });
      });

      document.getElementById("tabBrowse").onclick = async () => {
        mode = "browse";
        document.getElementById("tabBrowse").classList.add("active");
        document.getElementById("tabSearch").classList.remove("active");
        document.getElementById("searchWrap").style.display = "none";
        document.getElementById("browsePager").style.display = "flex";

        const data = await meili(INDEX_FILES, {
          q: "",
          limit: browseLimit,
          offset: browseOffset,
          sort: ["created_at:desc"]
        });

        resultsDiv.innerHTML = "";
        (data.hits || []).forEach(hit => {
          const div = document.createElement("div");
          div.className = "result";
          div.innerHTML = `
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <div>
      <div class="file">${hit.filename}</div>
      <div class="dt">${epochToLocal(hit.created_at)}</div>
    </div>
      <div style="display:flex; gap:8px; align-items:center;">
        <a class="btn btn-secondary"
           href="/audio/${baseName(hit.filename)}.txt"
           download>
          TXT
        </a>
        <a class="btn btn-secondary"
           href="/audio/${hit.filename}"
           download>
          Audio
        </a>
        <button class="btn btn-secondary btn-delete"
                data-fn="${hit.filename}"
                ${currentFile === hit.filename ? "disabled" : ""}>
          Delete
        </button>
      </div>
  </div>
`;


          // click anywhere except delete → play
          div.onclick = (e) => {
            if (!e.target.classList.contains("btn-delete")) {
              loadFile(hit.filename, 0);
            }
          };


          resultsDiv.appendChild(div);
          div.querySelector(".btn-delete").onclick = async (e) => {
            e.stopPropagation();
            if (!confirm(`Delete ${hit.filename}? This cannot be undone.`)) return;

            const resp = await fetch("/api/delete", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ filename: hit.filename })
            });

            const data = await resp.json();
            if (!resp.ok) {
              alert("Delete failed: " + (data.error || resp.statusText));
              return;
            }

            div.remove();
          };

        });
      };

      document.getElementById("tabSearch").onclick = () => {
        mode = "search";
        document.getElementById("tabSearch").classList.add("active");
        document.getElementById("tabBrowse").classList.remove("active");
        document.getElementById("searchWrap").style.display = "block";
        document.getElementById("browsePager").style.display = "none";
        resultsDiv.innerHTML = "";
      };

      const uploadFiles = document.getElementById("uploadFiles");
      const chooseBtn = document.getElementById("chooseBtn");
      const chosenLabel = document.getElementById("chosenLabel");

      if (chooseBtn && uploadFiles) {
        chooseBtn.onclick = () => uploadFiles.click();

        uploadFiles.addEventListener("change", () => {
          const n = uploadFiles.files ? uploadFiles.files.length : 0;
          chosenLabel.textContent =
            n === 0 ? "No files chosen" : `${n} file(s) selected`;
        });
      }

      async function doUpload() {
        const input = document.getElementById("uploadFiles");
        const status = document.getElementById("uploadStatus");
        const btn = document.getElementById("uploadBtn");

        if (!input.files || input.files.length === 0) {
          status.textContent = "Select one or more audio files first.";
          return;
        }

        const form = new FormData();
        for (const f of input.files) form.append("files", f);

        btn.disabled = true;
        status.textContent = `Uploading ${input.files.length} file(s)...`;

        try {
          const resp = await fetch("/api/upload", { method: "POST", body: form });
          const data = await resp.json();

          if (!resp.ok) {
            status.textContent = `Upload failed: ${data.error || resp.statusText}`;
            return;
          }

          const saved = (data.saved || []).length;
          const rej = (data.rejected || []).length;
          status.textContent = `Uploaded: ${saved}. Rejected: ${rej}.`;

          if (rej > 0) {
            console.log("Rejected:", data.rejected);
          }

          // Clear selection after upload
          input.value = "";
          document.getElementById("chosenLabel").textContent = "No files chosen";
        } catch (e) {
          status.textContent = `Upload failed: ${e}`;
        } finally {
          btn.disabled = false;
        }
      }

      document.getElementById("uploadBtn")?.addEventListener("click", doUpload);

    </script>

  </div>
</body>

</html>
