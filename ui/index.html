<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>StrixNote</title>

  <link rel="stylesheet" href="theme.css">
  <link rel="icon" type="image/png" href="/assets/strixnote-icon.png">

  <style>
    .transcriptWrap {
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transition: max-height 180ms ease, opacity 180ms ease;
    }

    .transcriptWrap.open {
      opacity: 1;
    }
  </style>

</head>

<body>
  <div class="container">

    <div class="header">
      <div class="brand" style="display:flex; flex-direction:column;">
        <img src="/assets/strixnote-logo1.png" alt="StrixNote" <img src="/assets/strixnote-logo1.png" alt="StrixNote"
          style="height:150px; width:auto; object-fit:contain; display:block;">
        <div class="brand-subtitle" style="margin-top:4px;">
          Wisdom that never leaves the nest.
        </div>
      </div>
      <button id="themeToggle" class="btn btn-secondary" type="button" style="margin-left:auto;">
        Light mode
      </button>
    </div>
    <div class="panel" style="margin-top: 12px;">
      <div class="row" style="justify-content: space-between;">
        <div>
          <div style="font-weight:600;">Upload audio</div>
          <div class="small muted">Files are saved to incoming/ and processed automatically.</div>
        </div>
        <div class="row">
          <input id="uploadFiles" type="file" multiple hidden accept=".wav,.mp3,.m4a,.aac,.flac,.ogg,.wma,.mp4,.webm" />

          <button id="chooseBtn" class="btn btn-secondary" type="button">
            Choose files
          </button>

          <span id="chosenLabel" class="small muted" style="align-self:center;">
            No files chosen
          </span>
          <button id="uploadBtn" class="btn btn-primary">Upload</button>
        </div>
      </div>
      <div id="uploadStatus" class="small muted" style="margin-top:10px;"></div>
      <div id="uploadProgressWrap" style="margin-top:8px; display:none;">
        <div class="progress">
          <div id="uploadProgressBar" class="progress-bar" style="width:0%"></div>
        </div>
        <div id="uploadPhase" class="small muted" style="margin-top:6px;"></div>
      </div>
      <div class="tabs">
        <div class="tab active" id="tabSearch">Search</div>
        <div class="tab" id="tabBrowse">Browse</div>
      </div>

      <div id="searchWrap" style="display:flex; flex-direction:column; gap:10px;">

        <!-- Row 1: mode + date -->
        <div class="row" style="gap:10px; align-items:center; flex-wrap:wrap;">
          <select id="searchMode" style="max-width:160px; height:38px; padding:6px 10px; box-sizing:border-box;">
            <option value="segments">Segments</option>
            <option value="files">Files</option>
          </select>

          <select id="dateField" style="max-width:160px; height:38px; padding:6px 10px; box-sizing:border-box;">
            <option value="">Any date</option>
            <option value="created_at">Uploaded date</option>
            <option value="recorded_at">Recorded date</option>
          </select>

          <input type="date" id="dateStart"
            style="width:160px; height:38px; padding:6px 10px; box-sizing:border-box;" />
          <span class="small muted" style="padding:0 4px;">To</span>
          <input type="date" id="dateEnd" style="width:160px; height:38px; padding:6px 10px; box-sizing:border-box;" />

          <button id="presetToday" class="btn btn-secondary" type="button" style="height:38px;">Today</button>
          <button id="preset7d" class="btn btn-secondary" type="button" style="height:38px;">Last 7</button>
          <button id="preset30d" class="btn btn-secondary" type="button" style="height:38px;">Last 30</button>

        </div>

        <div class="row" style="display:flex; gap:10px; align-items:center; flex-wrap:nowrap;">
          <input id="searchBox" placeholder="Search..."
            style="flex:1; min-width:200px; height:38px; padding:6px 10px; box-sizing:border-box;" />

          <button id="searchBtn" class="btn btn-primary" type="button" style="height:38px;">
            Search
          </button>
          <button id="clearBtn" class="btn btn-primary" type="button" style="height:38px;">
            Clear
          </button>

        </div>
      </div>

      <div class="panel">
        <div id="nowPlayingTitle">Player</div>
        <div id="nowPlayingMeta" style="color:#999;"></div>

        <audio id="player" controls preload="metadata"></audio>
        <div id="captionBox" class="captionBox"></div>
      </div>

      <div id="results"></div>

      <div id="browsePager" class="pager" style="display:none;">
        <button id="prevPage">Prev</button>
        <span id="pagerInfo" style="padding:0 10px;"></span>
        <button id="nextPage">Next</button>
      </div>

      <script src="/config.js"></script>

      <script>
        const MEILI = window.APP_CONFIG.MEILI_URL;
        const INDEX_SEG = window.APP_CONFIG.MEILI_INDEX_SEGMENTS;
        const INDEX_FILES = window.APP_CONFIG.MEILI_INDEX_FILES;

        const player = document.getElementById("player");
        const captionBox = document.getElementById("captionBox");
        const resultsDiv = document.getElementById("results");
        const searchBox = document.getElementById("searchBox");
        const searchMode = document.getElementById("searchMode");
        const dateField = document.getElementById("dateField");
        const dateStart = document.getElementById("dateStart");
        const dateEnd = document.getElementById("dateEnd");
        const presetToday = document.getElementById("presetToday");
        const preset7d = document.getElementById("preset7d");
        const preset30d = document.getElementById("preset30d");

        let mode = "search";
        let browseOffset = 0;
        let searchOffset = 0;
        let searchQuery = "";
        let searchModeValue = "segments";
        const SEARCH_MODE_KEY = "strixnote_search_mode";
        let currentFile = null;
        const browseLimit = 20;

        try {
          const saved = localStorage.getItem(SEARCH_MODE_KEY);
          if (saved === "segments" || saved === "files") searchModeValue = saved;
        } catch (e) { }

        if (searchMode) {
          searchMode.value = searchModeValue;
          searchMode.addEventListener("change", async () => {
            searchModeValue = searchMode.value === "files" ? "files" : "segments";
            try { localStorage.setItem(SEARCH_MODE_KEY, searchModeValue); } catch (e) { }
            searchOffset = 0;
            if (searchQuery) await performSearch();
          });
        }

        function baseName(f) { return f.replace(/\.[^/.]+$/, ""); }
        function msToHMS(ms) {
          const s = Math.floor(ms / 1000);
          const h = Math.floor(s / 3600);
          const m = Math.floor((s % 3600) / 60);
          const sec = s % 60;
          return [h, m, sec].map(v => String(v).padStart(2, "0")).join(":");
        }
        function epochToLocal(e) {
          const d = new Date(e * 1000);
          const yy = d.getFullYear();
          const mm = String(d.getMonth() + 1).padStart(2, "0");
          const dd = String(d.getDate()).padStart(2, "0");
          return `${yy}/${mm}/${dd}`;
        }

        async function meili(index, body) {
          const r = await fetch(`${MEILI}/search/${index}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body)
          });
          return r.json();
        }
        function formatBytes(bytes) {
          if (bytes == null || isNaN(bytes)) return "";
          const units = ["B", "KB", "MB", "GB"];
          let v = Number(bytes);
          let i = 0;
          while (v >= 1024 && i < units.length - 1) { v /= 1024; i++; }
          const num = i === 0 ? String(Math.round(v)) : v.toFixed(v >= 10 ? 1 : 2);
          return `${num} ${units[i]}`;
        }

        function formatDuration(seconds) {
          if (seconds == null || isNaN(seconds)) return "";
          const s = Math.round(Number(seconds));
          const h = Math.floor(s / 3600);
          const m = Math.floor((s % 3600) / 60);
          const sec = s % 60;
          if (h > 0) return `${h}:${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
          return `${m}:${String(sec).padStart(2, "0")}`;
        }

        function formatMeta(hit) {
          const dur = formatDuration(hit.duration_s);
          const size = formatBytes(hit.audio_bytes);
          const parts = [];
          if (dur) parts.push(dur);
          if (size) parts.push(size);
          return parts.length ? ` \u2022 ${parts.join(" \u2022 ")}` : "";
        }
        function resetPlayer() {
          try { player.pause(); } catch (e) { }
          player.removeAttribute("src");
          player.innerHTML = "";
          player.load();
          captionBox.textContent = "";
        }

        function wireCaptions() {
          const tt = player.textTracks[0];
          if (!tt) return;
          tt.mode = "hidden";
          tt.addEventListener("cuechange", () => {
            const cues = tt.activeCues;
            if (!cues || !cues.length) { captionBox.textContent = ""; return; }
            captionBox.textContent = Array.from(cues).map(c => c.text).join("\n");
          });
        }

        function loadFile(filename, startMs = 0) {
          currentFile = filename;
          resetPlayer();
          refreshBrowseIfVisible();

          const src = document.createElement("source");
          src.src = "/audio/" + encodeURIComponent(filename);
          player.appendChild(src);

          const track = document.createElement("track");
          track.kind = "subtitles";
          track.srclang = "en";
          track.src = "/audio/" + encodeURIComponent(baseName(filename) + ".vtt");
          track.default = true;
          player.appendChild(track);

          player.load();

          player.addEventListener("loadedmetadata", () => {
            player.currentTime = startMs / 1000;
            player.play().catch(() => { });
          }, { once: true });

          wireCaptions();
        }

        function refreshBrowseIfVisible() {
          if (mode === "browse") {
            document.getElementById("tabBrowse").click();
          }
        }

        async function performSearch() {

          let filter = null;

          const startDay = (dateStart?.value || "").trim();
          const endDayRaw = (dateEnd?.value || "").trim();

          let field = (dateField?.value || "").trim();
          // If "Any date" selected but a start date is set, default to uploaded date
          if (!field && startDay) field = "created_at";

          // If end is blank, treat it as same day as start (single-day range)
          let endDay = endDayRaw || startDay;

          if ((field === "created_at" || field === "recorded_at") && startDay) {
            // start/end are YYYY-MM-DD; compute local day start; end is inclusive, so add 1 day for exclusive bound
            let start = new Date(startDay + "T00:00:00");
            let endExclusive = new Date(endDay + "T00:00:00");
            endExclusive.setDate(endExclusive.getDate() + 1);

            // If end < start, swap them (keep endExclusive as exclusive bound)
            if (endExclusive.getTime() < start.getTime()) {
              start = new Date(endDay + "T00:00:00");
              endExclusive = new Date(startDay + "T00:00:00");
              endExclusive.setDate(endExclusive.getDate() + 1);
            }

            const startSec = Math.floor(start.getTime() / 1000);
            const endSec = Math.floor(endExclusive.getTime() / 1000);

            filter = `${field} >= ${startSec} AND ${field} < ${endSec}`;
          }

          if (!searchQuery && !filter) return;

          const isFiles = (searchModeValue === "files") || (!searchQuery && !!filter);
          const index = isFiles ? INDEX_FILES : INDEX_SEG;

          const req = {
            q: searchQuery,
            limit: browseLimit,
            offset: searchOffset,
            filter: filter || undefined,
            sort: ["created_at:desc"],
            attributesToHighlight: ["text"],
            attributesToCrop: ["text"],
            cropLength: 60
          };

          const data = await meili(index, req);

          resultsDiv.innerHTML = "";
          (data.hits || []).forEach(hit => {
            const div = document.createElement("div");
            div.className = "result";

            if (isFiles) {
              div.innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <div>
        <div class="file">${hit.filename}</div>
        <div class="dt">${epochToLocal(hit.created_at)}${formatMeta(hit)}</div>
      </div>
      <div style="display:flex; gap:8px; align-items:center;">
        <button class="btn btn-secondary btn-text"
                type="button"
                data-fn="${hit.filename}"
                style="height:38px; display:inline-flex; align-items:center;">
          Text
        </button>

        <a class="btn btn-secondary"
           href="/audio/${baseName(hit.filename)}.txt"
           download
           style="height:38px; display:inline-flex; align-items:center;">
          Download
        </a>

        <a class="btn btn-secondary"
           href="/audio/${hit.filename}"
           download
           style="height:38px; display:inline-flex; align-items:center;">
          Audio
        </a>

        <button class="btn btn-secondary btn-delete"
                data-fn="${hit.filename}"
                ${currentFile === hit.filename ? "disabled" : ""}
                style="height:38px; display:inline-flex; align-items:center;">
          Delete
        </button>
      </div>
    </div>

    <div class="transcriptWrap" style="max-height:0px; overflow:hidden; opacity:0; transition:max-height 180ms ease, opacity 180ms ease; margin-top:10px;">
      <div class="small muted" style="margin-bottom:6px;">Transcript</div>
      <div class="transcriptBox"
           style="max-height:14em; overflow:auto; padding:10px; border:1px solid #333; border-radius:8px; white-space:pre-wrap;">
      </div>
    </div>
  `;

              // click anywhere except buttons/links -> play
              div.onclick = (e) => {
                if (e.target.closest("a") || e.target.closest("button")) return;
                loadFile(hit.filename, 0);
              };

              // delete
              const delBtn = div.querySelector(".btn-delete");
              if (delBtn) {
                delBtn.onclick = async (e) => {
                  e.stopPropagation();
                  if (!confirm(`Delete ${hit.filename}? This cannot be undone.`)) return;

                  const resp = await fetch("/api/delete", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ filename: hit.filename })
                  });

                  const data = await resp.json();
                  if (!resp.ok) {
                    alert("Delete failed: " + (data.error || resp.statusText));
                    return;
                  }

                  div.remove();
                  refreshBrowseIfVisible();
                };
              }

              // transcript toggle (auto-close others)
              const textBtn = div.querySelector(".btn-text");
              const transcriptWrap = div.querySelector(".transcriptWrap");
              const transcriptBox = div.querySelector(".transcriptBox");

              if (textBtn && transcriptWrap && transcriptBox) {
                textBtn.onclick = async (e) => {
                  e.stopPropagation();

                  // Helper to close a row smoothly
                  const closeWrap = (w) => {
                    w.classList.remove("open");
                    w.style.maxHeight = "0px";
                    w.style.opacity = "0";

                    const b = w.closest(".result")?.querySelector(".btn-text");
                    if (b) b.textContent = "Text";
                  };

                  // Close any other open transcripts
                  document.querySelectorAll("#results .transcriptWrap.open").forEach(w => {
                    if (w !== transcriptWrap) closeWrap(w);
                  });

                  const isOpen = transcriptWrap.classList.contains("open");
                  if (isOpen) {
                    closeWrap(transcriptWrap);
                    return;
                  }

                  // Open smoothly
                  transcriptWrap.classList.add("open");
                  transcriptWrap.style.opacity = "1";
                  transcriptWrap.style.maxHeight = transcriptWrap.scrollHeight + "px";
                  textBtn.textContent = "Hide";

                  // Lazy-load transcript once
                  if (!transcriptBox.dataset.loaded) {
                    transcriptBox.textContent = "Loading...";
                    try {
                      const fn = textBtn.getAttribute("data-fn") || hit.filename || "";
                      const txtUrl = "/audio/" + encodeURIComponent(baseName(fn) + ".txt");
                      const r = await fetch(txtUrl);
                      if (!r.ok) throw new Error(`HTTP ${r.status}`);
                      const txt = await r.text();
                      transcriptBox.textContent = txt || "(empty)";
                      transcriptBox.dataset.loaded = "1";

                      // Re-expand after content loads
                      transcriptWrap.style.maxHeight = transcriptWrap.scrollHeight + "px";
                    } catch (err) {
                      transcriptBox.textContent = "Failed to load transcript.";
                    }
                  }
                };
              }
            } else {

              div.innerHTML = `
        <div class="file">${hit.filename}</div>
        <div class="time">@ ${msToHMS(hit.start_ms)}</div>
        <div class="dt">${epochToLocal(hit.created_at)}</div>
        <div class="snippet">${hit._formatted?.text || hit.text}</div>
      `;
              div.onclick = () => loadFile(hit.filename, hit.start_ms);
            }

            resultsDiv.appendChild(div);
          });

          // Pager + count
          const total = data.estimatedTotalHits ?? 0;
          const start = total === 0 ? 0 : searchOffset + 1;
          const end = Math.min(searchOffset + (data.hits?.length || 0), total);
          document.getElementById("pagerInfo").textContent =
            total === 0 ? "No results" : `${start}-${end} of ${total}`;

          document.getElementById("prevPage").disabled = (searchOffset === 0);
          document.getElementById("nextPage").disabled = !data.hits || data.hits.length < browseLimit;
        }

        searchBox.addEventListener("keypress", async e => {
          if (e.key !== "Enter") return;

          const q = e.target.value.trim();
          searchQuery = q; // allow empty query when date filter is set

          searchOffset = 0;
          mode = "search";

          document.getElementById("tabSearch").classList.add("active");
          document.getElementById("tabBrowse").classList.remove("active");
          document.getElementById("searchWrap").style.display = "block";
          document.getElementById("browsePager").style.display = "flex";

          await performSearch();

          // Reset date filter after executing search
          if (dateField) dateField.value = "";
          if (dateStart) dateStart.value = "";
          if (dateEnd) dateEnd.value = "";
        });

        const searchBtn = document.getElementById("searchBtn");

        if (searchBtn) {
          searchBtn.addEventListener("click", async () => {
            const q = (searchBox?.value || "").trim();

            searchQuery = q; // may be empty for date-only
            searchOffset = 0;
            mode = "search";

            document.getElementById("tabSearch").classList.add("active");
            document.getElementById("tabBrowse").classList.remove("active");
            document.getElementById("searchWrap").style.display = "block";
            document.getElementById("browsePager").style.display = "flex";

            await performSearch();

            // Reset date filter after executing search
            if (dateField) dateField.value = "";
            if (dateStart) dateStart.value = "";
            if (dateEnd) dateEnd.value = "";
          });
        }

        const clearBtn = document.getElementById("clearBtn");

        if (clearBtn) {
          clearBtn.addEventListener("click", () => {
            if (searchBox) searchBox.value = "";
            if (dateField) dateField.value = "";
            if (dateStart) dateStart.value = "";
            if (dateEnd) dateEnd.value = "";

            searchQuery = "";
            searchOffset = 0;

            resultsDiv.innerHTML = "";
            document.getElementById("pagerInfo").textContent = "No results";
            document.getElementById("prevPage").disabled = true;
            document.getElementById("nextPage").disabled = true;
          });
        }

        function ymdLocal(d) {
          const mm = String(d.getMonth() + 1).padStart(2, "0");
          const dd = String(d.getDate()).padStart(2, "0");
          const yy = d.getFullYear();
          return `${yy}-${mm}-${dd}`;
        }

        async function runPreset(daysBack) {
          const today = new Date();
          const start = new Date();
          start.setDate(today.getDate() - (daysBack - 1)); // inclusive range

          if (dateField && !dateField.value) dateField.value = "created_at";
          if (dateStart) dateStart.value = ymdLocal(start);
          if (dateEnd) dateEnd.value = ymdLocal(today);

          searchQuery = (searchBox?.value || "").trim(); // allow optional term
          searchOffset = 0;
          mode = "search";

          document.getElementById("tabSearch").classList.add("active");
          document.getElementById("tabBrowse").classList.remove("active");
          document.getElementById("searchWrap").style.display = "block";
          document.getElementById("browsePager").style.display = "flex";

          await performSearch();

          // Clear date fields after executing search (consistent behavior)
          if (dateField) dateField.value = "";
          if (dateStart) dateStart.value = "";
          if (dateEnd) dateEnd.value = "";
        }

        if (presetToday) presetToday.addEventListener("click", () => runPreset(1));
        if (preset7d) preset7d.addEventListener("click", () => runPreset(7));
        if (preset30d) preset30d.addEventListener("click", () => runPreset(30));

        document.getElementById("tabBrowse").onclick = async () => {
          mode = "browse";
          document.getElementById("tabBrowse").classList.add("active");
          document.getElementById("tabSearch").classList.remove("active");
          document.getElementById("searchWrap").style.display = "none";
          document.getElementById("browsePager").style.display = "flex";

          const data = await meili(INDEX_FILES, {
            q: "",
            limit: browseLimit,
            offset: browseOffset,
            sort: ["created_at:desc"]
          });

          const total = data.estimatedTotalHits ?? 0;
          const start = total === 0 ? 0 : browseOffset + 1;
          const end = Math.min(browseOffset + (data.hits?.length || 0), total);
          document.getElementById("pagerInfo").textContent =
            total === 0 ? "No files" : `${start}-${end} of ${total}`;

          resultsDiv.innerHTML = "";
          (data.hits || []).forEach(hit => {
            const div = document.createElement("div");
            div.className = "result";
            div.innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <div>
        <div class="file">${hit.filename}</div>
        <div class="dt">${epochToLocal(hit.created_at)}${formatMeta(hit)}</div>
      </div>
        <div style="display:flex; gap:8px; align-items:center;">
                      <button class="btn btn-secondary btn-text"
                    type="button"
                    data-fn="${hit.filename}"
                    style="height:38px; display:inline-flex; align-items:center;">
              Text
            </button>

            <a class="btn btn-secondary"
               href="/audio/${baseName(hit.filename)}.txt"
               download
               style="height:38px; display:inline-flex; align-items:center;">
              Download
            </a>

            <a class="btn btn-secondary"
               href="/audio/${hit.filename}"
               download
               style="height:38px; display:inline-flex; align-items:center;">
              Audio
            </a>

            <button class="btn btn-secondary btn-delete"
                    data-fn="${hit.filename}"
                    ${currentFile === hit.filename ? "disabled" : ""}
                    style="height:38px; display:inline-flex; align-items:center;">
              Delete
            </button>
        </div>
    </div>

      <div class="transcriptWrap"
     style="margin-top:10px; max-height:0px; overflow:hidden; opacity:0; transition:max-height 180ms ease, opacity 180ms ease;">
        <div class="small muted" style="margin-bottom:6px;">Transcript</div>
        <div class="transcriptBox"
             style="max-height:14em; overflow:auto; padding:10px; border:1px solid #333; border-radius:8px; white-space:pre-wrap;">
        </div>
      </div>
  `;

            // click anywhere except delete → play
            div.onclick = (e) => {
              // If clicking a button or link, do not trigger playback
              if (e.target.closest("a") || e.target.closest("button")) {
                return;
              }
              loadFile(hit.filename, 0);
            };


            resultsDiv.appendChild(div);
            div.querySelector(".btn-delete").onclick = async (e) => {
              e.stopPropagation();
              if (!confirm(`Delete ${hit.filename}? This cannot be undone.`)) return;

              const resp = await fetch("/api/delete", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ filename: hit.filename })
              });

              const data = await resp.json();
              if (!resp.ok) {
                alert("Delete failed: " + (data.error || resp.statusText));
                return;
              }

              div.remove();
            };
            const textBtn = div.querySelector(".btn-text");
            const transcriptWrap = div.querySelector(".transcriptWrap");
            const transcriptBox = div.querySelector(".transcriptBox");

            if (textBtn && transcriptWrap && transcriptBox) {
              textBtn.onclick = async (e) => {
                e.stopPropagation();

                // Helper to close a row smoothly
                const closeWrap = (w) => {
                  w.classList.remove("open");
                  w.style.maxHeight = "0px";
                  w.style.opacity = "0";

                  const b = w.closest(".result")?.querySelector(".btn-text");
                  if (b) b.textContent = "Text";

                  // actually hide after the collapse transition
                  setTimeout(() => { w.style.display = "none"; }, 180);
                };

                // Close any other open transcripts
                document.querySelectorAll("#results .transcriptWrap.open").forEach(w => {
                  if (w !== transcriptWrap) closeWrap(w);
                });

                const isOpen = transcriptWrap.classList.contains("open");
                if (isOpen) {
                  closeWrap(transcriptWrap);
                  return;
                }

                // Open smoothly
                transcriptWrap.style.display = "block";
                transcriptWrap.classList.add("open");
                transcriptWrap.style.opacity = "0";
                transcriptWrap.style.maxHeight = "0px";
                textBtn.textContent = "Hide";

                // wait one frame so display:block applies, then measure/expand
                requestAnimationFrame(() => {
                  transcriptWrap.style.opacity = "1";
                  transcriptWrap.style.maxHeight = transcriptWrap.scrollHeight + "px";
                });

                // Lazy-load transcript once
                if (!transcriptBox.dataset.loaded) {
                  transcriptBox.textContent = "Loading...";
                  try {
                    const fn = textBtn.getAttribute("data-fn") || "";
                    const txtUrl = "/audio/" + encodeURIComponent(baseName(fn) + ".txt");
                    const r = await fetch(txtUrl);
                    if (!r.ok) throw new Error(`HTTP ${r.status}`);
                    const txt = await r.text();
                    transcriptBox.textContent = txt || "(empty)";
                    transcriptBox.dataset.loaded = "1";
                    transcriptWrap.style.maxHeight = transcriptWrap.scrollHeight + "px";
                  } catch (err) {
                    transcriptBox.textContent = "Failed to load transcript.";
                  }
                }
              };
            }
          });
        };

        document.getElementById("tabSearch").onclick = async () => {
          const wasSearch = (mode === "search");

          mode = "search";
          document.getElementById("tabSearch").classList.add("active");
          document.getElementById("tabBrowse").classList.remove("active");
          document.getElementById("searchWrap").style.display = "block";
          document.getElementById("browsePager").style.display = "flex";

          // If we were already on Search, clicking the tab acts like "Search"
          if (wasSearch) {
            const q = (searchBox?.value || "").trim();
            const hasDay = !!((dateStart?.value || "").trim() || (dateEnd?.value || "").trim());

            // Run search if we have a query OR a date selected (date-only search)
            if (q || hasDay) {
              searchQuery = q; // may be empty for date-only
              searchOffset = 0;
              await performSearch();
              // Reset date filter after executing search
              if (dateField) dateField.value = "";
              if (dateStart) dateStart.value = "";
              if (dateEnd) dateEnd.value = "";
              return;
            }
          }

          // If switching into Search mode, don't clear results if a query already exists.
          if (!searchQuery) resultsDiv.innerHTML = "";
        };

        const uploadFiles = document.getElementById("uploadFiles");
        const chooseBtn = document.getElementById("chooseBtn");
        const chosenLabel = document.getElementById("chosenLabel");

        if (chooseBtn && uploadFiles) {
          chooseBtn.onclick = () => uploadFiles.click();

          uploadFiles.addEventListener("change", () => {
            const n = uploadFiles.files ? uploadFiles.files.length : 0;
            chosenLabel.textContent =
              n === 0 ? "No files chosen" : `${n} file(s) selected`;
          });
        }
        async function pollProcessing(filename, progressWrap, progressContainer, progressPhase) {
          const maxWaitMs = 30 * 60 * 1000; // 30 minutes safety
          const start = Date.now();

          while (Date.now() - start < maxWaitMs) {
            try {
              const r = await fetch(`/api/status?filename=${encodeURIComponent(filename)}`);
              const data = await r.json();

              if (data.state === "done") {
                progressContainer.classList.remove("pulse");
                progressPhase.textContent = "Processing complete.";

                // If Browse tab is active, refresh the list automatically
                refreshBrowseIfVisible();

                setTimeout(() => {
                  progressWrap.style.display = "none";
                }, 5000);
                return;
              }

              if (data.state === "missing") {
                progressContainer.classList.remove("pulse");
                progressPhase.textContent = "File not found.";
                return;
              }

            } catch (e) {
              console.log("Status poll error:", e);
            }

            await new Promise(r => setTimeout(r, 2000));
          }

          progressContainer.classList.remove("pulse");
          progressPhase.textContent = "Processing timeout.";
        }
        async function doUpload() {
          const input = document.getElementById("uploadFiles");
          const status = document.getElementById("uploadStatus");
          const btn = document.getElementById("uploadBtn");

          const progressWrap = document.getElementById("uploadProgressWrap");
          const progressBar = document.getElementById("uploadProgressBar");
          const progressPhase = document.getElementById("uploadPhase");
          const progressContainer = progressBar.parentElement;

          if (!input.files || input.files.length === 0) {
            status.textContent = "Select one or more audio files first.";
            return;
          }

          const form = new FormData();
          for (const f of input.files) form.append("files", f);

          btn.disabled = true;
          status.textContent = "";
          progressWrap.style.display = "block";
          progressBar.style.width = "0%";
          progressPhase.textContent = "Uploading...";

          const xhr = new XMLHttpRequest();
          xhr.open("POST", "/api/upload");

          xhr.upload.onprogress = (e) => {
            if (e.lengthComputable) {
              const percent = Math.round((e.loaded / e.total) * 100);
              progressBar.style.width = percent + "%";
            }
          };

          xhr.onload = async () => {
            if (xhr.status >= 200 && xhr.status < 300) {
              progressBar.style.width = "100%";
              progressPhase.textContent = "Processing (large files may take a while)...";

              // Switch to pulse animation
              progressContainer.classList.add("pulse");

              let uploadedName = null;
              try {
                const data = JSON.parse(xhr.responseText || "{}");
                uploadedName = (data.saved && data.saved[0] && data.saved[0].filename) ? data.saved[0].filename : null;
              } catch (e) { }

              const toPoll = uploadedName || (input.files[0] ? input.files[0].name : "");
              if (toPoll) {
                await pollProcessing(toPoll, progressWrap, progressContainer, progressPhase);
              } else {
                progressContainer.classList.remove("pulse");
                progressPhase.textContent = "Uploaded, but could not determine filename to track.";
              }

              input.value = "";
              document.getElementById("chosenLabel").textContent = "No files chosen";
            } else {
              progressPhase.textContent = "Upload failed.";
            }

            btn.disabled = false;
          };

          xhr.onerror = () => {
            progressPhase.textContent = "Upload failed.";
            btn.disabled = false;
          };

          xhr.send(form);
        }
        // Theme toggle (persisted)
        const themeToggle = document.getElementById("themeToggle");
        const THEME_KEY = "strixnote_theme";

        function applyTheme(theme) {
          const root = document.documentElement;

          if (theme === "light") {
            root.setAttribute("data-theme", "light");
            if (themeToggle) themeToggle.textContent = "Dark mode";
          } else {
            root.removeAttribute("data-theme");
            if (themeToggle) themeToggle.textContent = "Light mode";
          }
        }

        // Apply saved theme on load
        try {
          const saved = localStorage.getItem(THEME_KEY);
          if (saved === "light" || saved === "dark") applyTheme(saved);
          else applyTheme("dark"); // default
        } catch (e) {
          applyTheme("dark");
        }

        if (themeToggle) {
          themeToggle.addEventListener("click", () => {
            const current = document.documentElement.getAttribute("data-theme") === "light" ? "light" : "dark";
            const next = current === "light" ? "dark" : "light";

            applyTheme(next);

            try {
              localStorage.setItem(THEME_KEY, next);
            } catch (e) { }
          });
        }
        document.getElementById("uploadBtn")?.addEventListener("click", doUpload);

        document.getElementById("prevPage").onclick = async () => {
          if (mode === "browse") {
            browseOffset = Math.max(0, browseOffset - browseLimit);
            await document.getElementById("tabBrowse").onclick();
          } else {
            searchOffset = Math.max(0, searchOffset - browseLimit);
            await performSearch();
          }
        };

        document.getElementById("nextPage").onclick = async () => {
          if (mode === "browse") {
            browseOffset += browseLimit;
            await document.getElementById("tabBrowse").onclick();
          } else {
            searchOffset += browseLimit;
            await performSearch();
          }
        };

      </script>

    </div>
    <div class="small muted" style="margin:12px 0 6px; text-align:center; opacity:0.85;">
      StrixNote • Wisdom that never leaves the nest. • shaneaune.com
    </div>
