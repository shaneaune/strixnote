<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>StrixNote</title>

  <link rel="stylesheet" href="theme.css">
  <link rel="icon" type="image/png" href="/assets/strixnote-icon.png">

</head>

<body>
  <div class="container">

    <div class="header">
      <div class="brand">
        <div class="brand-badge">
          <img src="/assets/strixnote-icon.png" alt="StrixNote">
        </div>
        <div>
          <div class="brand-title">StrixNote</div>
          <div class="brand-subtitle">Wisdom that never leaves the nest.</div>
        </div>
      </div>
      <button id="themeToggle" class="btn btn-secondary" type="button" style="margin-left:auto;">
        Light mode
      </button>
    </div>
    <div class="panel" style="margin-top: 12px;">
      <div class="row" style="justify-content: space-between;">
        <div>
          <div style="font-weight:600;">Upload audio</div>
          <div class="small muted">Files are saved to incoming/ and processed automatically.</div>
        </div>
        <div class="row">
          <input id="uploadFiles" type="file" multiple hidden accept=".wav,.mp3,.m4a,.aac,.flac,.ogg,.wma,.mp4,.webm" />

          <button id="chooseBtn" class="btn btn-secondary" type="button">
            Choose files
          </button>

          <span id="chosenLabel" class="small muted" style="align-self:center;">
            No files chosen
          </span>
          <button id="uploadBtn" class="btn btn-primary">Upload</button>
        </div>
      </div>
      <div id="uploadStatus" class="small muted" style="margin-top:10px;"></div>
      <div id="uploadProgressWrap" style="margin-top:8px; display:none;">
        <div class="progress">
          <div id="uploadProgressBar" class="progress-bar" style="width:0%"></div>
        </div>
        <div id="uploadPhase" class="small muted" style="margin-top:6px;"></div>
      </div>
      <div class="tabs">
        <div class="tab active" id="tabSearch">Search</div>
        <div class="tab" id="tabBrowse">Browse</div>
      </div>

      <div id="searchWrap" style="display:flex; gap:10px; align-items:center;">
        <select id="searchMode" style="max-width:160px;">
          <option value="segments">Segments</option>
          <option value="files">Files</option>
        </select>
        <input id="searchBox" placeholder="Search..." style="flex:1;" />
      </div>

      <div class="panel">
        <div id="nowPlayingTitle">Player</div>
        <div id="nowPlayingMeta" style="color:#999;"></div>

        <audio id="player" controls preload="metadata"></audio>
        <div id="captionBox" class="captionBox"></div>
      </div>

      <div id="results"></div>

      <div id="browsePager" class="pager" style="display:none;">
        <button id="prevPage">Prev</button>
        <span id="pagerInfo" style="padding:0 10px;"></span>
        <button id="nextPage">Next</button>
      </div>

      <script src="/config.js"></script>

      <script>
        const MEILI = window.APP_CONFIG.MEILI_URL;
        const INDEX_SEG = window.APP_CONFIG.MEILI_INDEX_SEGMENTS;
        const INDEX_FILES = window.APP_CONFIG.MEILI_INDEX_FILES;

        const player = document.getElementById("player");
        const captionBox = document.getElementById("captionBox");
        const resultsDiv = document.getElementById("results");
        const searchBox = document.getElementById("searchBox");
        const searchMode = document.getElementById("searchMode");

        let mode = "search";
        let browseOffset = 0;
        let searchOffset = 0;
        let searchQuery = "";
        let searchModeValue = "segments";
        const SEARCH_MODE_KEY = "strixnote_search_mode";
        let currentFile = null;
        const browseLimit = 20;

        try {
          const saved = localStorage.getItem(SEARCH_MODE_KEY);
          if (saved === "segments" || saved === "files") searchModeValue = saved;
        } catch (e) { }

        if (searchMode) {
          searchMode.value = searchModeValue;
          searchMode.addEventListener("change", async () => {
            searchModeValue = searchMode.value === "files" ? "files" : "segments";
            try { localStorage.setItem(SEARCH_MODE_KEY, searchModeValue); } catch (e) { }
            searchOffset = 0;
            if (searchQuery) await performSearch();
          });
        }

        function baseName(f) { return f.replace(/\.[^/.]+$/, ""); }
        function msToHMS(ms) {
          const s = Math.floor(ms / 1000);
          const h = Math.floor(s / 3600);
          const m = Math.floor((s % 3600) / 60);
          const sec = s % 60;
          return [h, m, sec].map(v => String(v).padStart(2, "0")).join(":");
        }
        function epochToLocal(e) { return new Date(e * 1000).toLocaleString(); }

        async function meili(index, body) {
          const r = await fetch(`${MEILI}/search/${index}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body)
          });
          return r.json();
        }
        function formatBytes(bytes) {
          if (bytes == null || isNaN(bytes)) return "";
          const units = ["B", "KB", "MB", "GB"];
          let v = Number(bytes);
          let i = 0;
          while (v >= 1024 && i < units.length - 1) { v /= 1024; i++; }
          const num = i === 0 ? String(Math.round(v)) : v.toFixed(v >= 10 ? 1 : 2);
          return `${num} ${units[i]}`;
        }

        function formatDuration(seconds) {
          if (seconds == null || isNaN(seconds)) return "";
          const s = Math.round(Number(seconds));
          const h = Math.floor(s / 3600);
          const m = Math.floor((s % 3600) / 60);
          const sec = s % 60;
          if (h > 0) return `${h}:${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
          return `${m}:${String(sec).padStart(2, "0")}`;
        }

        function formatMeta(hit) {
          const dur = formatDuration(hit.duration_s);
          const size = formatBytes(hit.audio_bytes);
          const parts = [];
          if (dur) parts.push(dur);
          if (size) parts.push(size);
          return parts.length ? ` \u2022 ${parts.join(" \u2022 ")}` : "";
        }
        function resetPlayer() {
          try { player.pause(); } catch (e) { }
          player.removeAttribute("src");
          player.innerHTML = "";
          player.load();
          captionBox.textContent = "";
        }

        function wireCaptions() {
          const tt = player.textTracks[0];
          if (!tt) return;
          tt.mode = "hidden";
          tt.addEventListener("cuechange", () => {
            const cues = tt.activeCues;
            if (!cues || !cues.length) { captionBox.textContent = ""; return; }
            captionBox.textContent = Array.from(cues).map(c => c.text).join("\n");
          });
        }

        function loadFile(filename, startMs = 0) {
          currentFile = filename;
          resetPlayer();
          refreshBrowseIfVisible();

          const src = document.createElement("source");
          src.src = "/audio/" + encodeURIComponent(filename);
          player.appendChild(src);

          const track = document.createElement("track");
          track.kind = "subtitles";
          track.srclang = "en";
          track.src = "/audio/" + encodeURIComponent(baseName(filename) + ".vtt");
          track.default = true;
          player.appendChild(track);

          player.load();

          player.addEventListener("loadedmetadata", () => {
            player.currentTime = startMs / 1000;
            player.play().catch(() => { });
          }, { once: true });

          wireCaptions();
        }

        function refreshBrowseIfVisible() {
          if (mode === "browse") {
            document.getElementById("tabBrowse").click();
          }
        }

        async function performSearch() {
          if (!searchQuery) return;

          const isFiles = (searchModeValue === "files");
          const index = isFiles ? INDEX_FILES : INDEX_SEG;

          const req = {
            q: searchQuery,
            limit: browseLimit,
            offset: searchOffset,
            sort: ["created_at:desc"],
            attributesToHighlight: ["text"],
            attributesToCrop: ["text"],
            cropLength: 60
          };

          const data = await meili(index, req);

          resultsDiv.innerHTML = "";
          (data.hits || []).forEach(hit => {
            const div = document.createElement("div");
            div.className = "result";

            if (isFiles) {
              div.innerHTML = `
        <div class="file">${hit.filename}</div>
        <div class="dt">${epochToLocal(hit.created_at)}${formatMeta(hit)}</div>
        <div class="snippet">${hit._formatted?.text || hit.text || ""}</div>
      `;
              div.onclick = () => loadFile(hit.filename, 0);
            } else {
              div.innerHTML = `
        <div class="file">${hit.filename}</div>
        <div class="time">@ ${msToHMS(hit.start_ms)}</div>
        <div class="dt">${epochToLocal(hit.created_at)}</div>
        <div class="snippet">${hit._formatted?.text || hit.text}</div>
      `;
              div.onclick = () => loadFile(hit.filename, hit.start_ms);
            }

            resultsDiv.appendChild(div);
          });

          // Pager + count
          const total = data.estimatedTotalHits ?? 0;
          const start = total === 0 ? 0 : searchOffset + 1;
          const end = Math.min(searchOffset + (data.hits?.length || 0), total);
          document.getElementById("pagerInfo").textContent =
            total === 0 ? "No results" : `${start}-${end} of ${total}`;

          document.getElementById("prevPage").disabled = (searchOffset === 0);
          document.getElementById("nextPage").disabled = !data.hits || data.hits.length < browseLimit;
        }

        searchBox.addEventListener("keypress", async e => {
          if (e.key !== "Enter") return;

          const q = e.target.value.trim();
          if (!q) return;

          searchQuery = q;
          searchOffset = 0;
          mode = "search";

          document.getElementById("tabSearch").classList.add("active");
          document.getElementById("tabBrowse").classList.remove("active");
          document.getElementById("searchWrap").style.display = "block";
          document.getElementById("browsePager").style.display = "flex";

          await performSearch();
        });

        document.getElementById("tabBrowse").onclick = async () => {
          mode = "browse";
          document.getElementById("tabBrowse").classList.add("active");
          document.getElementById("tabSearch").classList.remove("active");
          document.getElementById("searchWrap").style.display = "none";
          document.getElementById("browsePager").style.display = "flex";

          const data = await meili(INDEX_FILES, {
            q: "",
            limit: browseLimit,
            offset: browseOffset,
            sort: ["created_at:desc"]
          });

          const total = data.estimatedTotalHits ?? 0;
          const start = total === 0 ? 0 : browseOffset + 1;
          const end = Math.min(browseOffset + (data.hits?.length || 0), total);
          document.getElementById("pagerInfo").textContent =
            total === 0 ? "No files" : `${start}-${end} of ${total}`;

          resultsDiv.innerHTML = "";
          (data.hits || []).forEach(hit => {
            const div = document.createElement("div");
            div.className = "result";
            div.innerHTML = `
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <div>
      <div class="file">${hit.filename}</div>
      <div class="dt">${epochToLocal(hit.created_at)}${formatMeta(hit)}</div>
    </div>
      <div style="display:flex; gap:8px; align-items:center;">
        <a class="btn btn-secondary"
           href="/audio/${baseName(hit.filename)}.txt"
           download>
          TXT
        </a>
        <a class="btn btn-secondary"
           href="/audio/${hit.filename}"
           download>
          Audio
        </a>
        <button class="btn btn-secondary btn-delete"
                data-fn="${hit.filename}"
                ${currentFile === hit.filename ? "disabled" : ""}>
          Delete
        </button>
      </div>
  </div>
`;


            // click anywhere except delete → play
            div.onclick = (e) => {
              if (!e.target.classList.contains("btn-delete")) {
                loadFile(hit.filename, 0);
              }
            };


            resultsDiv.appendChild(div);
            div.querySelector(".btn-delete").onclick = async (e) => {
              e.stopPropagation();
              if (!confirm(`Delete ${hit.filename}? This cannot be undone.`)) return;

              const resp = await fetch("/api/delete", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ filename: hit.filename })
              });

              const data = await resp.json();
              if (!resp.ok) {
                alert("Delete failed: " + (data.error || resp.statusText));
                return;
              }

              div.remove();
            };

          });
        };

        document.getElementById("tabSearch").onclick = () => {
          mode = "search";
          document.getElementById("tabSearch").classList.add("active");
          document.getElementById("tabBrowse").classList.remove("active");
          document.getElementById("searchWrap").style.display = "block";
          document.getElementById("browsePager").style.display = "none";
          resultsDiv.innerHTML = "";
        };

        const uploadFiles = document.getElementById("uploadFiles");
        const chooseBtn = document.getElementById("chooseBtn");
        const chosenLabel = document.getElementById("chosenLabel");

        if (chooseBtn && uploadFiles) {
          chooseBtn.onclick = () => uploadFiles.click();

          uploadFiles.addEventListener("change", () => {
            const n = uploadFiles.files ? uploadFiles.files.length : 0;
            chosenLabel.textContent =
              n === 0 ? "No files chosen" : `${n} file(s) selected`;
          });
        }
        async function pollProcessing(filename, progressWrap, progressContainer, progressPhase) {
          const maxWaitMs = 30 * 60 * 1000; // 30 minutes safety
          const start = Date.now();

          while (Date.now() - start < maxWaitMs) {
            try {
              const r = await fetch(`/api/status?filename=${encodeURIComponent(filename)}`);
              const data = await r.json();

              if (data.state === "done") {
                progressContainer.classList.remove("pulse");
                progressPhase.textContent = "Processing complete.";

                // If Browse tab is active, refresh the list automatically
                refreshBrowseIfVisible();

                setTimeout(() => {
                  progressWrap.style.display = "none";
                }, 5000);
                return;
              }

              if (data.state === "missing") {
                progressContainer.classList.remove("pulse");
                progressPhase.textContent = "File not found.";
                return;
              }

            } catch (e) {
              console.log("Status poll error:", e);
            }

            await new Promise(r => setTimeout(r, 2000));
          }

          progressContainer.classList.remove("pulse");
          progressPhase.textContent = "Processing timeout.";
        }
        async function doUpload() {
          const input = document.getElementById("uploadFiles");
          const status = document.getElementById("uploadStatus");
          const btn = document.getElementById("uploadBtn");

          const progressWrap = document.getElementById("uploadProgressWrap");
          const progressBar = document.getElementById("uploadProgressBar");
          const progressPhase = document.getElementById("uploadPhase");
          const progressContainer = progressBar.parentElement;

          if (!input.files || input.files.length === 0) {
            status.textContent = "Select one or more audio files first.";
            return;
          }

          const form = new FormData();
          for (const f of input.files) form.append("files", f);

          btn.disabled = true;
          status.textContent = "";
          progressWrap.style.display = "block";
          progressBar.style.width = "0%";
          progressPhase.textContent = "Uploading...";

          const xhr = new XMLHttpRequest();
          xhr.open("POST", "/api/upload");

          xhr.upload.onprogress = (e) => {
            if (e.lengthComputable) {
              const percent = Math.round((e.loaded / e.total) * 100);
              progressBar.style.width = percent + "%";
            }
          };

          xhr.onload = async () => {
            if (xhr.status >= 200 && xhr.status < 300) {
              progressBar.style.width = "100%";
              progressPhase.textContent = "Processing (large files may take a while)...";

              // Switch to pulse animation
              progressContainer.classList.add("pulse");

              let uploadedName = null;
              try {
                const data = JSON.parse(xhr.responseText || "{}");
                uploadedName = (data.saved && data.saved[0] && data.saved[0].filename) ? data.saved[0].filename : null;
              } catch (e) { }

              const toPoll = uploadedName || (input.files[0] ? input.files[0].name : "");
              if (toPoll) {
                await pollProcessing(toPoll, progressWrap, progressContainer, progressPhase);
              } else {
                progressContainer.classList.remove("pulse");
                progressPhase.textContent = "Uploaded, but could not determine filename to track.";
              }

              input.value = "";
              document.getElementById("chosenLabel").textContent = "No files chosen";
            } else {
              progressPhase.textContent = "Upload failed.";
            }

            btn.disabled = false;
          };

          xhr.onerror = () => {
            progressPhase.textContent = "Upload failed.";
            btn.disabled = false;
          };

          xhr.send(form);
        }
        // Theme toggle (persisted)
        const themeToggle = document.getElementById("themeToggle");
        const THEME_KEY = "strixnote_theme";

        function applyTheme(theme) {
          const root = document.documentElement;

          if (theme === "light") {
            root.setAttribute("data-theme", "light");
            if (themeToggle) themeToggle.textContent = "Dark mode";
          } else {
            root.removeAttribute("data-theme");
            if (themeToggle) themeToggle.textContent = "Light mode";
          }
        }

        // Apply saved theme on load
        try {
          const saved = localStorage.getItem(THEME_KEY);
          if (saved === "light" || saved === "dark") applyTheme(saved);
          else applyTheme("dark"); // default
        } catch (e) {
          applyTheme("dark");
        }

        if (themeToggle) {
          themeToggle.addEventListener("click", () => {
            const current = document.documentElement.getAttribute("data-theme") === "light" ? "light" : "dark";
            const next = current === "light" ? "dark" : "light";

            applyTheme(next);

            try {
              localStorage.setItem(THEME_KEY, next);
            } catch (e) { }
          });
        }
        document.getElementById("uploadBtn")?.addEventListener("click", doUpload);

        document.getElementById("prevPage").onclick = async () => {
          if (mode === "browse") {
            browseOffset = Math.max(0, browseOffset - browseLimit);
            await document.getElementById("tabBrowse").onclick();
          } else {
            searchOffset = Math.max(0, searchOffset - browseLimit);
            await performSearch();
          }
        };

        document.getElementById("nextPage").onclick = async () => {
          if (mode === "browse") {
            browseOffset += browseLimit;
            await document.getElementById("tabBrowse").onclick();
          } else {
            searchOffset += browseLimit;
            await performSearch();
          }
        };

      </script>

    </div>
</body>

</html>
