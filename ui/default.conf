server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ =404;
  }

  location /audio/ {
    alias /mnt/audio/;
    autoindex off;
    add_header Accept-Ranges bytes;
    add_header Cache-Control "no-cache";

    # Ensure correct MIME types for subtitle files
    types {
      text/vtt vtt;
      application/x-subrip srt;
      audio/ogg ogg;
      audio/wav wav;
      audio/mpeg mp3;
      audio/mp4 m4a mp4;
      audio/flac flac;
      audio/aac aac;
      audio/webm webm;
    }
    default_type application/octet-stream;
  }
}
